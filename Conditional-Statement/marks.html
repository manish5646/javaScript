<!DOCTYPE html>
<html>
<head>
  <title>JS</title>

  <script>
    let marks=+prompt("enter the marks");
    if(marks>=50)
      console.log("A++ Grade");

    else if(marks=50)
    console.log("B Grade");

    else if(marks=30)
    console.log("pass")

    else (marks<30)
    console.log("fail");

</head>

</body>
</html>
